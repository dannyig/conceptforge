name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Print app version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Deploying ConceptForge v${VERSION}"
          echo "## Deploying ConceptForge v${VERSION}" >> $GITHUB_STEP_SUMMARY

      - name: Build
        run: pnpm build

      - name: Deploy to fly.io
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Fly deploy
        run: flyctl deploy --remote-only --build-arg APP_VERSION=$(node -p "require('./package.json').version")
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
